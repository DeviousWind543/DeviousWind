<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | DeviousWind</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#000;

color:white;

display:flex;
align-items:center;
justify-content:center;

height:100vh;

overflow:hidden;

}

/* CANVAS FONDO */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* CONTENEDOR */

.container{

text-align:center;

padding:40px 25px;

max-width:420px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

backdrop-filter:blur(15px);

box-shadow:0 20px 60px rgba(0,0,0,.8);

animation:fadeIn 1s ease;

}

/* LOGO */

.logo{

font-size:1rem;
color:#aaa;
margin-bottom:10px;

}

/* ERROR */

.error{

font-size:5rem;
font-weight:700;

background:linear-gradient(90deg,#00ff88,#00c853);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:10px;

}

/* TITULO */

h1{

font-size:1.4rem;
margin-bottom:10px;

}

/* TEXTO */

p{

color:#bbb;
font-size:.9rem;

line-height:1.5;

margin-bottom:25px;

}

/* BOTON */

.btn{

display:inline-block;

padding:12px 28px;

border-radius:30px;

font-size:.9rem;

background:rgba(0,255,120,.12);

border:1px solid rgba(0,255,120,.4);

color:white;

text-decoration:none;

transition:.25s;

}

.btn:hover{

background:rgba(0,255,120,.25);

transform:scale(1.05);

box-shadow:0 0 15px rgba(0,255,120,.5);

}

/* ANIMACION */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:500px){

.error{
font-size:3.5rem;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="logo">
DeviousWind
</div>

<div class="error">
404
</div>

<h1>Página no encontrada</h1>

<p>
La página que estás buscando no existe o fue movida.<br>
Explora más de DeviousWind.
</p>

<a href="index.html" class="btn">
Volver al inicio
</a>

</div>

<script>

/* PARTICULAS TIPO FUEGO VERDE */

const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles = []

class Particle{

constructor(){
this.x = Math.random() * canvas.width
this.y = canvas.height + Math.random()*100

this.size = Math.random() * 3 + 1

this.speedY = Math.random() * 2 + 1
this.speedX = (Math.random() - 0.5) * 1

this.opacity = Math.random()
}

update(){

this.y -= this.speedY
this.x += this.speedX

this.opacity -= 0.005

if(this.opacity <= 0){
this.reset()
}

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)

ctx.fillStyle = `rgba(0,255,120,${this.opacity})`

ctx.shadowColor = "#00ff88"
ctx.shadowBlur = 15

ctx.fill()

}

reset(){
this.x = Math.random() * canvas.width
this.y = canvas.height
this.opacity = Math.random()
}

}

/* CREAR PARTICULAS */

for(let i=0;i<120;i++){
particles.push(new Particle())
}

/* ANIMACION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)
}

animate()

/* RESPONSIVE */

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth
canvas.height = window.innerHeight
})

</script>

</body>
</html>
